services:
    server:
        build:
            context: ./server
            dockerfile: Dockerfile.dev
        ports:
            - '${SERVER_PORT:-3001}:3000'
        environment:
            - PORT=3000
            - CLIENT_URL=http://localhost:${CLIENT_PORT:-5173}
        volumes:
            - ./server:/app
            - server_node_modules:/app/node_modules
        command: npm run dev -- --legacy-watch

    client:
        build:
            context: ./client
            dockerfile: Dockerfile.dev
        ports:
            - '${CLIENT_PORT:-5173}:5173'
        environment:
            - VITE_API_URL=http://localhost:${SERVER_PORT:-3001}
            - DOCKER=true
        volumes:
            - ./client:/app
            - client_node_modules:/app/node_modules
        depends_on:
            - server

volumes:
    server_node_modules:
    client_node_modules:
